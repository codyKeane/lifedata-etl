# LifeData V4 — Master Configuration
# ──────────────────────────────────────────────────────────────
# SECURITY: This file must be chmod 600 (owner read/write only).
# API keys are referenced as ${ENV_VAR} and resolved at runtime
# from ~/LifeData/.env via python-dotenv. NEVER hardcode keys.
# ──────────────────────────────────────────────────────────────

lifedata:
  version: "4.0"
  timezone: "America/Chicago"
  db_path: "~/LifeData/db/lifedata.db"
  raw_base: "~/LifeData/raw/LifeData"
  media_base: "~/LifeData/media"
  reports_dir: "~/LifeData/reports"
  log_path: "~/LifeData/logs/etl.log"

  # ──────────────────────────────────────────────────────────
  # Security settings
  # ──────────────────────────────────────────────────────────
  security:
    # Syncthing relay MUST be false — enforced by META at every ETL run.
    # LifeData data must never traverse a third-party relay server.
    syncthing_relay_enabled: false
    syncthing_api_key: "${SYNCTHING_API_KEY}"

    # Record device certificate fingerprints after first Syncthing setup.
    # Used for verification — prevents rogue device pairing.
    syncthing_device_fingerprint_desktop: ""
    syncthing_device_fingerprint_phone: ""

    # Only modules listed here are loaded by the orchestrator.
    # Any directory in modules/ not on this list is silently skipped.
    module_allowlist:
      - device
      - environment
      - body
      - mind
      - world
      - social
      - media
      - meta

  # ──────────────────────────────────────────────────────────
  # Module configuration
  # ──────────────────────────────────────────────────────────
  modules:
    device:
      enabled: true

    environment:
      enabled: true
      weather_api_key: "${WEATHER_API_KEY}"
      airnow_api_key: "${AIRNOW_API_KEY}"
      ambee_api_key: "${AMBEE_API_KEY}"
      home_lat: 0.0
      home_lon: 0.0
      seismic_radius_km: 500
      emf_sample_interval_sec: 30
      sound_sample_interval_min: 10
      lux_sample_interval_min: 5

    body:
      enabled: true
      sensor_logger_dir: "logs/sensors"
      sensor_window_minutes: 5
      caffeine_half_life_hours: 5.0
      sleep_target_hours: 7.5
      step_goal: 8000
      samsung_health_export_dir: "spool/health/samsung"
      health_connect_enabled: false

    mind:
      enabled: true

    world:
      enabled: true
      newsapi_key: "${NEWS_API_KEY}"
      eia_api_key: "${EIA_API_KEY}"
      rss_feeds:
        - name: "Ars Technica"
          url: "https://feeds.arstechnica.com/arstechnica/index"
          category: "technology"
        - name: "Hacker News (top)"
          url: "https://hnrss.org/frontpage"
          category: "technology"
        - name: "Nature News"
          url: "http://feeds.nature.com/nature/rss/current"
          category: "science"

    social:
      enabled: true
      anonymize_contacts: true
      app_overrides: {}

    media:
      enabled: true
      whisper_model: "base"
      auto_transcribe: true
      photo_extract_exif: true
      video_extract_thumbnail: true
      sync_video_on_wifi_only: true
      max_voice_duration_sec: 300
      photo_categories:
        - Document
        - Receipt
        - Wildlife
        - Work
        - Scene
        - Food
        - Person
        - Other

    meta:
      enabled: true
      completeness_check: true
      quality_check: true
      storage_check: true
      sync_lag_check: true
      syncthing_relay_check: true
      db_backup_check: true
      audio_spool_check: true
      retention_enforce: true
      alert_on_critical: true
      kde_connect_alerts: false
      archive_threshold_gb: 10

  # ──────────────────────────────────────────────────────────
  # Analysis settings
  # ──────────────────────────────────────────────────────────
  analysis:
    correlation_window_days: 30
    anomaly_zscore_threshold: 2.0
    min_observations: 14
    min_confidence_for_correlation: 0.5
    weekly_correlation_metrics:
      - mind.mood
      - mind.energy
      - mind.focus
      - mind.stress
      - body.sleep_quality
      - body.steps
      - body.caffeine
      - environment.geomagnetic
      - environment.weather_temp
      - environment.air_quality
      - environment.barometric_pressure
      - social.density_score
      - social.digital_hygiene
      - world.news_sentiment
      - world.fear_composite
      - device.screen_time

  # ──────────────────────────────────────────────────────────
  # Data retention
  # ──────────────────────────────────────────────────────────
  retention:
    raw_files_days: 365
    log_rotation_days: 30
    parquet_archive_after_days: 90
    db_backup_keep_days: 7

  # ──────────────────────────────────────────────────────────
  # Scheduling
  # ──────────────────────────────────────────────────────────
  schedule:
    etl_cron: "55 23 * * *"
    news_cron: "0 */4 * * *"
    astro_cron: "0 5 * * *"
    analysis_cron: "0 0 * * 0"
