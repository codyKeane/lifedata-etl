# LifeData V4 — Master Configuration
# ──────────────────────────────────────────────────────────────
# SECURITY: This file must be chmod 600 (owner read/write only).
# API keys are referenced as ${ENV_VAR} and resolved at runtime
# from ~/LifeData/.env via python-dotenv. NEVER hardcode keys.
# ──────────────────────────────────────────────────────────────

lifedata:
  version: "4.0"
  timezone: "America/Chicago"
  db_path: "~/LifeData/db/lifedata.db"
  raw_base: "~/LifeData/raw/LifeData"
  media_base: "~/LifeData/media"
  reports_dir: "~/LifeData/reports"
  log_path: "~/LifeData/logs/etl.log"

  # ──────────────────────────────────────────────────────────
  # Security settings
  # ──────────────────────────────────────────────────────────
  security:
    # Syncthing relay MUST be false — enforced by META at every ETL run.
    # LifeData data must never traverse a third-party relay server.
    syncthing_relay_enabled: false
    syncthing_api_key: "${SYNCTHING_API_KEY}"

    # Record device certificate fingerprints after first Syncthing setup.
    # Used for verification — prevents rogue device pairing.
    syncthing_device_fingerprint_desktop: ""
    syncthing_device_fingerprint_phone: ""

    # Only modules listed here are loaded by the orchestrator.
    # Any directory in modules/ not on this list is silently skipped.
    module_allowlist:
      - device
      - environment
      - body
      - mind
      - world
      - social
      - media
      - meta
      - cognition
      - behavior
      - oracle

  # ──────────────────────────────────────────────────────────
  # Module configuration
  # ──────────────────────────────────────────────────────────
  modules:
    device:
      enabled: true
      # disabled_metrics: []  # e.g. ["device.derived:battery_drain_rate"]

    environment:
      enabled: true
      weather_api_key: "${WEATHER_API_KEY}"
      airnow_api_key: "${AIRNOW_API_KEY}"
      ambee_api_key: "${AMBEE_API_KEY}"
      home_lat: "${HOME_LAT}"
      home_lon: "${HOME_LON}"
      seismic_radius_km: 500
      emf_sample_interval_sec: 30
      sound_sample_interval_min: 10
      lux_sample_interval_min: 5

    body:
      enabled: true
      sensor_logger_dir: "logs/sensors"
      sensor_window_minutes: 5
      caffeine_half_life_hours: 5.0
      sleep_target_hours: 7.5
      step_goal: 8000
      samsung_health_export_dir: "spool/health/samsung"
      health_connect_enabled: false

    mind:
      enabled: true

    world:
      enabled: true
      newsapi_key: "${NEWS_API_KEY}"
      eia_api_key: "${EIA_API_KEY}"
      rss_feeds:
        - name: "Ars Technica"
          url: "https://feeds.arstechnica.com/arstechnica/index"
          category: "technology"
        - name: "Hacker News (top)"
          url: "https://hnrss.org/frontpage"
          category: "technology"
        - name: "Nature News"
          url: "https://feeds.nature.com/nature/rss/current"
          category: "science"

    social:
      enabled: true
      anonymize_contacts: true
      app_overrides: {}

    media:
      enabled: true
      whisper_model: "base"
      auto_transcribe: true
      photo_extract_exif: true
      video_extract_thumbnail: true
      sync_video_on_wifi_only: true
      max_voice_duration_sec: 300
      photo_categories:
        - Document
        - Receipt
        - Wildlife
        - Work
        - Scene
        - Food
        - Person
        - Other

    meta:
      enabled: true

    cognition:
      enabled: true
      simple_rt_trials: 3
      choice_rt_trials: 5
      gonogo_trials: 10
      digit_span_start: 3
      digit_span_max_trials: 8
      time_production_targets: [5, 10, 15, 30]
      typing_prompt_pool_size: 10
      passive_typing_enabled: false
      impairment_zscore_threshold: 2.0
      baseline_window_days: 14
      completeness_check: true
      quality_check: true
      storage_check: true
      sync_lag_check: true
      syncthing_relay_check: true
      db_backup_check: true
      audio_spool_check: true
      retention_enforce: true
      alert_on_critical: true
      kde_connect_alerts: false
      archive_threshold_gb: 10

    behavior:
      enabled: true
      fragmentation_ceiling: 60
      min_dwell_sec: 1
      max_dwell_sec: 3600
      min_latency_ms: 200
      max_latency_ms: 30000
      step_goal: 8000
      sedentary_threshold: 50
      sedentary_min_bout_hours: 2
      baseline_window_days: 14
      restlessness_threshold: 2.0

    oracle:
      enabled: true
      home_lat: "${HOME_LAT}"
      home_lon: "${HOME_LON}"
      analysis_window_days: 90
      iching_default_method: "coin"
      auto_daily_casting: true
      store_raw_question: false
      rng_sample_interval_min: 30
      rng_batch_size: 100
      schumann_enabled: true
      schumann_fetch_interval_hours: 1
      planetary_hours_enabled: true
      planetary_hours_tag_events: true

  # ──────────────────────────────────────────────────────────
  # ETL engine settings
  # ──────────────────────────────────────────────────────────
  etl:
    # Skip files whose mtime is less than this many seconds ago.
    # Prevents parsing Syncthing partial writes (mid-sync protection).
    file_stability_seconds: 60

  # ──────────────────────────────────────────────────────────
  # Analysis settings
  # ──────────────────────────────────────────────────────────
  analysis:
    correlation_window_days: 30
    anomaly_zscore_threshold: 2.0
    min_observations: 14
    min_confidence_for_correlation: 0.5
    weekly_correlation_metrics:
      - mind.mood
      - mind.energy
      - mind.focus
      - mind.stress
      - body.sleep_quality
      - body.steps
      - body.caffeine
      - environment.geomagnetic
      - environment.weather_temp
      - environment.air_quality
      - environment.barometric_pressure
      - social.density_score
      - social.digital_hygiene
      - world.news_sentiment
      - world.fear_composite
      - device.screen_time
      # Cognition metrics (Phase 1)
      - cognition.reaction
      - cognition.memory
      - cognition.derived
      # Behavior metrics (Phase 2)
      - behavior.app_switch
      - behavior.steps
      - behavior.derived
      # Oracle metrics (Phase 3)
      - oracle.rng
      - oracle.schumann

    # ────────────────────────────────────────────────────────
    # Compound anomaly patterns (config-driven)
    # Each pattern fires when ALL conditions are met on a given day.
    # Set enabled: false to disable a pattern without deleting it.
    # ────────────────────────────────────────────────────────
    patterns:
      - name: heavy_phone_usage
        enabled: true
        description_template: "Low battery ({battery_avg:.0f}%) with high screen unlocks ({screen_events}) — heavy phone usage day"
        conditions:
          - metric: device.battery
            aggregate: AVG
            operator: "<"
            threshold: 20
          - metric: device.screen
            aggregate: COUNT
            operator: ">"
            threshold: 50

      - name: sleep_deprivation_high_stress
        enabled: true
        description_template: "Short sleep ({sleep_hours:.1f}h) combined with high stress ({stress_level:.0f}/10) — burnout risk"
        conditions:
          - metric: body.derived
            event_type: sleep_duration
            operator: "<"
            threshold: 6.0
          - metric: mind.stress
            operator: ">"
            threshold: 6

      - name: caffeine_late_poor_sleep
        enabled: true
        description_template: "Caffeine intake after 14:00 ({late_caffeine_mg:.0f}mg) with poor sleep quality ({sleep_quality:.0f}/10)"
        conditions:
          - metric: body.caffeine
            event_type: intake
            aggregate: SUM
            operator: ">"
            threshold: 0
            hour_filter: ">= 14"
          - metric: mind.sleep
            operator: "<"
            threshold: 5

      - name: low_mood_social_isolation
        enabled: true
        description_template: "Low mood ({mood:.0f}/10) with minimal social interaction (density={social_density:.1f})"
        conditions:
          - metric: mind.mood
            operator: "<"
            threshold: 4
          - metric: social.derived
            event_type: density_score
            operator: "<"
            threshold: 10

      - name: high_screen_low_movement
        enabled: true
        description_template: "High screen time ({screen_time_min:.0f} min) with low step count ({steps:.0f}) — sedentary day"
        conditions:
          - metric: device.derived
            event_type: screen_time_minutes
            operator: ">"
            threshold: 180
          - metric: body.steps
            aggregate: SUM
            operator: "<"
            threshold: 3000

      - name: cognitive_impairment_sleep_deprivation
        enabled: true
        description_template: "High cognitive impairment (CLI={cognitive_load_index:.1f}) after short sleep ({sleep_hours:.1f}h)"
        conditions:
          - metric: cognition.derived
            event_type: cognitive_load_index
            operator: ">"
            threshold: 2.0
          - metric: body.derived
            event_type: sleep_duration
            operator: "<"
            threshold: 6.0

      - name: digital_restlessness_low_mood
        enabled: true
        description_template: "Digital restlessness (z={digital_restlessness:.1f}) with low mood ({mood:.0f}/10)"
        conditions:
          - metric: behavior.derived
            event_type: digital_restlessness
            operator: ">"
            threshold: 2.0
          - metric: mind.mood
            operator: "<"
            threshold: 4

      - name: schumann_excursion_mood_swing
        enabled: true
        description_template: "Schumann resonance deviation ({schumann_mean_hz:.2f} Hz) with wide mood swing (range={mood_range:.0f})"
        conditions:
          - metric: oracle.schumann
            operator: ">"
            threshold: 8.13
          - metric: mind.mood
            aggregate: COUNT
            operator: ">"
            threshold: 1

      - name: fragmentation_caffeine_spike
        enabled: true
        description_template: "High app fragmentation ({fragmentation_index:.0f}) with heavy caffeine ({caffeine_mg:.0f}mg)"
        conditions:
          - metric: behavior.app_switch.derived
            event_type: fragmentation_index
            operator: ">"
            threshold: 50
          - metric: body.caffeine
            aggregate: SUM
            operator: ">"
            threshold: 300

    # ────────────────────────────────────────────────────────
    # Hypothesis definitions (config-driven)
    # Users can add/remove/modify hypotheses without code changes.
    # ────────────────────────────────────────────────────────
    hypotheses:
      - name: "Geomagnetic storms reduce mood"
        metric_a: environment.geomagnetic
        metric_b: mind.mood
        direction: negative
        threshold: 0.05
        enabled: true

      - name: "Morning light exposure improves energy"
        metric_a: environment.hourly
        metric_b: mind.energy
        direction: positive
        enabled: true

      - name: "Afternoon caffeine disrupts sleep"
        metric_a: body.caffeine
        metric_b: body.sleep_quality
        direction: negative
        enabled: true

      - name: "Social interaction improves next-day mood"
        metric_a: social.density_score
        metric_b: mind.mood
        direction: positive
        enabled: true

      - name: "High notification volume reduces focus"
        metric_a: social.notification
        metric_b: mind.focus
        direction: negative
        enabled: true

      # direction=positive: higher sentiment score correlates with higher mood
      - name: "Negative news sentiment predicts lower mood"
        metric_a: world.news_sentiment
        metric_b: mind.mood
        direction: positive
        enabled: true

      - name: "Caffeine improves reaction time within 2 hours"
        metric_a: body.caffeine
        metric_b: cognition.reaction
        direction: negative
        enabled: true

      - name: "Sleep deprivation impairs cognitive load index"
        metric_a: body.sleep
        metric_b: cognition.derived
        direction: negative
        enabled: true

      - name: "High stress correlates with impaired working memory"
        metric_a: mind.stress
        metric_b: cognition.memory
        direction: negative
        enabled: true

      - name: "Morning cognition scores predict self-reported productivity"
        metric_a: cognition.reaction
        metric_b: mind.focus
        direction: negative
        enabled: true

    # ────────────────────────────────────────────────────────
    # Report configuration
    # ────────────────────────────────────────────────────────
    report:
      trend_metrics:
        - mind.mood
        - body.steps
        - device.derived:screen_time_minutes
        - cognition.reaction
      sections:
        - module: device
          enabled: true
        - module: environment
          enabled: true
        - module: body
          enabled: true
        - module: mind
          enabled: true
        - module: social
          enabled: true
        - module: cognition
          enabled: true
        - module: behavior
          enabled: true
        - module: oracle
          enabled: true
        - module: world
          enabled: true

  # ──────────────────────────────────────────────────────────
  # Data retention
  # ──────────────────────────────────────────────────────────
  retention:
    raw_files_days: 365
    log_rotation_days: 30
    parquet_archive_after_days: 90
    db_backup_keep_days: 7

  # ──────────────────────────────────────────────────────────
  # Scheduling
  # ──────────────────────────────────────────────────────────
  schedule:
    etl_cron: "55 23 * * *"
    news_cron: "0 */4 * * *"
    astro_cron: "0 5 * * *"
    analysis_cron: "0 0 * * 0"
